<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Skin Analysis App</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="container">
    <h1>Personalized Skincare Recommendations</h1>
    <form id="skinForm">
      <label for="skinType">Skin Type:</label>
      <select id="skinType" required>
        <option value="">--Choose--</option>
        <option value="dry">Dry</option>
        <option value="oily">Oily</option>
        <option value="normal">Normal</option>
        <option value="combination">Combination</option>
        <option value="sensitive">Sensitive</option>
      </select>

      <label>Skin Concerns (select multiple):</label>
      <div class="checkbox-group">
        <label><input type="checkbox" value="acne" /> Acne</label>
        <label><input type="checkbox" value="pigmentation" /> Pigmentation</label>
        <label><input type="checkbox" value="aging" /> Aging</label>
        <label><input type="checkbox" value="dullness" /> Dullness</label>
        <label><input type="checkbox" value="darkcircles" /> Dark Circles</label>
        <label><input type="checkbox" value="pores" /> Enlarged Pores</label>
        <label><input type="checkbox" value="dryness" /> Dryness</label>
        <label><input type="checkbox" value="sensitivity" /> Sensitivity</label>
        <label><input type="checkbox" value="aging" /> Puffiness</label>
        <label><input type="checkbox" value="aging" /> Tanning</label>
        <label><input type="checkbox" value="aging" /> Whiteheads</label>
        <label><input type="checkbox" value="aging" /> Blackheads</label>
        <label><input type="checkbox" value="aging" /> Acne scars</label>
        <label><input type="checkbox" value="aging" /> Irritation</label>
      </div>

      <button type="submit">Get Recommendations</button>
    </form>

    <div id="result" class="result-box"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
